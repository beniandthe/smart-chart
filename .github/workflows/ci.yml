name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-package:
    name: SwiftPM tests
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect app-impacting changes
        id: app_changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if ! changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null)"; then
              changed_files="$(git ls-files)"
            fi
          else
            changed_files="$(git ls-files)"
          fi

          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(SmartChart/|SmartChartTests/|ThirdParty/|scripts/|Package.swift|Package.resolved|project.yml|\.github/workflows/ci.yml|\.github/scripts/)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report skipped SwiftPM tests
        if: steps.app_changes.outputs.run_tests != 'true'
        run: echo "No app-impacting files changed; SwiftPM tests are skipped for this documentation/config-only pass."

      - name: Show toolchain
        if: steps.app_changes.outputs.run_tests == 'true'
        run: |
          swift --version
          xcodebuild -version

      - name: Run Swift package tests
        if: steps.app_changes.outputs.run_tests == 'true'
        run: swift test

  ios-simulator:
    name: iOS simulator tests
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect app-impacting changes
        id: app_changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if ! changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null)"; then
              changed_files="$(git ls-files)"
            fi
          else
            changed_files="$(git ls-files)"
          fi

          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(SmartChart/|SmartChartTests/|ThirdParty/|scripts/|Package.swift|Package.resolved|project.yml|\.github/workflows/ci.yml|\.github/scripts/)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report skipped iOS simulator tests
        if: steps.app_changes.outputs.run_tests != 'true'
        run: echo "No app-impacting files changed; iOS simulator tests are skipped for this documentation/config-only pass."

      - name: Show toolchain
        if: steps.app_changes.outputs.run_tests == 'true'
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        if: steps.app_changes.outputs.run_tests == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.app_changes.outputs.run_tests == 'true'
        run: xcodegen generate

      - name: Select iPad simulator
        if: steps.app_changes.outputs.run_tests == 'true'
        run: .github/scripts/select-ipad-simulator.sh

      - name: Run Xcode tests
        if: steps.app_changes.outputs.run_tests == 'true'
        run: |
          xcodebuild test \
            -scheme SmartChart \
            -destination "$SIMULATOR_DESTINATION" \
            -resultBundlePath "$RUNNER_TEMP/SmartChart.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Xcode result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: SmartChart-xcresult
          path: ${{ runner.temp }}/SmartChart.xcresult
          if-no-files-found: ignore
          retention-days: 7
